version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Run fmt, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  deps:tidy:
    desc: Tidy module dependencies
    cmds:
      - go mod tidy

  docs:build:
    desc: Build documentation (markdown to HTML)
    cmds:
      - task-plus md2html --file index.md --dst docs
      - task-plus md2html --file README.md --dst docs
      - task-plus md2html --file CHANGELOG.md --dst docs
      - task-plus md2html --file ROADMAP.md --dst docs

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf docs/
      - go clean -testcache
